<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Donations List</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .table-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">
           Community Fund
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">
                       Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/collection/">
                       Total Collection
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/donations/">
                       Donations
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="#">
                       Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

    <!-- Donation List -->

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="table-box">

                    <h2 class="text-center mb-4">
                        May Donations
                    </h2>

                    <table class="table table-bordered">

                        <thead class="table-success">

                            <tr>

                                <th>Name</th>
                                <th>Amount</th>

                            </tr>

                        </thead>

                        <tbody>

                        {% for donation in donations %}

                        <tr>

                        <td>{{ donation.name }}</td>

                        <td>₹{{ donation.amount }}</td>

                        </tr>

                        {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
